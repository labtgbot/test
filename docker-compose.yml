version: '3.8'

services:
  telegram-bot-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FREE_CLAUDE_BASE_URL=http://free-claude-code:8082
      - FREE_CLAUDE_AUTH_TOKEN=${FREE_CLAUDE_AUTH_TOKEN}
      - FREE_CLAUDE_DEFAULT_MODEL=${FREE_CLAUDE_DEFAULT_MODEL:-claude-3-haiku-20240307}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_GUEST_MODE_ENABLED=${TELEGRAM_GUEST_MODE_ENABLED:-true}
      - API_SECRET_TOKEN=${API_SECRET_TOKEN}
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
    depends_on:
      - free-claude-code
    restart: unless-stopped

  free-claude-code:
    image: ghcr.io/labtgbot/free-claude-code:latest
    ports:
      - "8082:8082"
    environment:
      - NIM_MODEL=nvidia_nim/z-ai/glm4.7
      # Add other required environment variables for free-claude-code
    restart: unless-stopped